openapi: 3.0.3
info:
  title: SEEK API - Plateforme Immobilière
  version: 1.0.0
  description: |
    API pour la plateforme de location immobilère SEEK au Sénégal

    ## Environments
    - **Local**: http://localhost:8000
    - **Production**: https://seek-api.onrender.com

    ## Authentification
    L'API utilise plusieurs types d'authentification JWT:
    - **Admin**: Cookie HTTP-Only avec access/refresh tokens
    - **Owner**: Bearer token dans le header Authorization
    - **Locataire**: Bearer token spécifique
    - **Compte Public**: Bearer token spécifique
  contact:
    name: Support SEEK
    email: support@seek.sn
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC
servers:
  - url: http://localhost:8000
    description: Serveur de développement local
  - url: https://seek-api.onrender.com
    description: Serveur de production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token pour Owner, Locataire, ou Compte Public
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: Cookie JWT pour Admin
  schemas:
    Error:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
tags:
  - name: Health
    description: Vérification de santé
  - name: Auth
    description: Authentification Admin
  - name: Owner
    description: Authentification et gestion Propriétaire
  - name: Locataire
    description: Espace Locataire
  - name: Compte Public
    description: Authentification et favoris Visiteur
  - name: Biems
    description: Gestion des biens immobiliers
  - name: Baux
    description: Gestion des baux locatifs
  - name: Transactions
    description: Historique des paiements
  - name: Geo
    description: Données géographiques
  - name: Types
    description: Types de logement et transaction
  - name: Premium
    description: Mise en avant payante
  - name: Monetisation
    description: Abonnements et paiements
  - name: Stats
    description: Statistiques
  - name: Signalements
    description: Signalements de contenu
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Vérification de santé de l'API
      responses:
        "200":
          description: API opérationnelle
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Connexion administrateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Connexion réussie
        "401":
          description: Identifiants invalides
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Obtenir le profil admin connecté
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Profil utilisateur
        "401":
          description: Non autorisé
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rafraîchir le token d'accès
      responses:
        "200":
          description: Token rafraîchi
        "401":
          description: Token invalide
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Déconnexion
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Déconnexion réussie
  /api/auth/profile:
    put:
      tags:
